name: Bug report
description: Report a problem with @codai/sdk
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest code snippet that reproduces the issue. Do NOT include your API key.
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "Node 20.11 / Cloudflare Workers / Deno 2"
    validations:
      required: true
